<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsWeaver - Tech News Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #0f1629;
            --bg-tertiary: #1a2046;
            --accent-blue: #00d9ff;
            --accent-purple: #a855f7;
            --accent-pink: #ff1493;
            --accent-green: #00ff88;
            --accent-orange: #ff7a00;
            --accent-cyan: #00f5ff;
            --text-primary: #ffffff;
            --text-secondary: #c5d3ff;
            --text-tertiary: #8b9aff;
            --border: #2a3a6b;
            --hover-bg: #1a2a5a;
            --shadow-sm: 0 2px 8px rgba(0, 212, 255, 0.08);
            --shadow-md: 0 8px 24px rgba(0, 212, 255, 0.12);
            --shadow-lg: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0d1b3d 50%, var(--bg-primary) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000000' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--accent-pink);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.8) 0%, rgba(26, 32, 70, 0.8) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 60px 20px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
            filter: blur(40px);
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 10s ease-in-out infinite reverse;
            filter: blur(40px);
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .header-icon {
            font-size: 3.5rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .header-text h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            font-size: 1.05rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            gap: 15px;
            margin: 40px 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 14px 18px;
            background: rgba(26, 32, 70, 0.5);
            border: 1.5px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .search-box::placeholder {
            color: var(--text-tertiary);
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: rgba(26, 32, 70, 0.8);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.05);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, rgba(26, 32, 70, 0.6) 0%, rgba(42, 58, 107, 0.6) 100%);
            border: 1.5px solid rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            border-color: var(--accent-blue);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 212, 255, 0.05) 100%);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2), inset 0 0 10px rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn.active {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            border-color: var(--accent-blue);
            color: var(--bg-primary);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            background: rgba(15, 22, 41, 0.95);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 100;
            min-width: 220px;
            max-height: 350px;
            overflow-y: auto;
            top: 100%;
            right: 0;
            margin-top: 8px;
            backdrop-filter: blur(10px);
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--border);
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        .dropdown-item:hover {
            background: var(--hover-bg);
        }

        .dropdown-item input {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: var(--accent-blue);
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 50px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(26, 32, 70, 0.6) 0%, rgba(42, 58, 107, 0.4) 100%);
            border: 1.5px solid rgba(0, 212, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            transition: all 0.6s ease;
        }

        .stat-card:hover::before {
            top: -30%;
            right: -30%;
        }

        .stat-card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
            transform: translateY(-8px);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            margin: 40px 0;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .category-tabs::-webkit-scrollbar {
            height: 4px;
        }

        .category-tabs::-webkit-scrollbar-track {
            background: transparent;
        }

        .category-tabs::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .category-tab {
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(26, 32, 70, 0.5) 0%, rgba(42, 58, 107, 0.3) 100%);
            border: 1.5px solid rgba(0, 212, 255, 0.15);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .category-tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: left;
        }

        .category-tab:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.15);
        }

        .category-tab.active {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            color: var(--bg-primary);
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        /* News Grid */
        .news-container {
            margin-bottom: 60px;
        }

        .news-section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .news-section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-pink));
            border-radius: 2px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 50px;
        }

        .news-card {
            background: linear-gradient(135deg, rgba(26, 32, 70, 0.7) 0%, rgba(42, 58, 107, 0.5) 100%);
            border: 1.5px solid rgba(0, 212, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-card:hover {
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 25px 50px rgba(0, 212, 255, 0.2), inset 0 0 30px rgba(0, 212, 255, 0.05);
            transform: translateY(-12px);
            background: linear-gradient(135deg, rgba(26, 32, 70, 0.9) 0%, rgba(42, 58, 107, 0.7) 100%);
        }

        .news-card-header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .news-card-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .badge-source {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(0, 212, 255, 0.05) 100%);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 212, 255, 0.4);
        }

        .badge-category {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.15) 0%, rgba(168, 85, 247, 0.05) 100%);
            color: var(--accent-purple);
            border: 1px solid rgba(168, 85, 247, 0.4);
        }

        .news-card:hover .badge {
            transform: scale(1.05);
        }

        .news-card-title {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.5;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .news-card:hover .news-card-title {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .news-card-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-card-time {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .news-card-read {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .news-card:hover .news-card-read {
            gap: 12px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .empty-state-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            background: linear-gradient(135deg, rgba(15, 22, 41, 0.8) 0%, rgba(26, 32, 70, 0.8) 100%);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 212, 255, 0.15);
            padding: 50px 20px;
            margin-top: 100px;
            text-align: center;
        }

        .footer-text {
            color: var(--text-tertiary);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .header-text h1 {
                font-size: 2rem;
            }

            .top-bar {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .btn-group {
                width: 100%;
            }

            .btn {
                flex: 1;
            }

            .news-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            }
            100% {
                box-shadow: 0 0 5px rgba(0, 212, 255, 0.3);
            }
        }

        .news-card {
            animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .news-card:nth-child(1) { animation-delay: 0.05s; }
        .news-card:nth-child(2) { animation-delay: 0.1s; }
        .news-card:nth-child(3) { animation-delay: 0.15s; }
        .news-card:nth-child(4) { animation-delay: 0.2s; }
        .news-card:nth-child(5) { animation-delay: 0.25s; }
        .news-card:nth-child(6) { animation-delay: 0.3s; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-icon">📰</div>
            <div class="header-text">
                <h1>NewsWeaver</h1>
                <p>Your Daily Tech News Hub</p>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <input 
                type="text" 
                class="search-box" 
                id="searchInput" 
                placeholder="🔍 Search articles..."
            >
            <div class="btn-group">
                <div class="dropdown">
                    <button class="btn" id="filterBtn">🔽 Sources</button>
                    <div class="dropdown-menu" id="filtersDropdown"></div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">Total Articles</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌐</div>
                <div class="stat-label">News Sources</div>
                <div class="stat-value" id="sourceCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏰</div>
                <div class="stat-label">Last Updated</div>
                <div class="stat-value" id="lastUpdated">—</div>
            </div>
        </div>

        <!-- Category Tabs -->
        <div class="category-tabs" id="categoryTabs"></div>

        <!-- News Container -->
        <div class="news-container">
            <div class="news-section-title" id="sectionTitle">All Articles</div>
            <div class="news-grid" id="newsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p class="footer-text">NewsWeaver © 2026 | Curating the best tech news daily</p>
    </div>

    <script>
        let allArticles = [];
        let filteredArticles = [];
        let activeFilters = new Set();
        let activeCategory = 'all';

        const categoryMap = {
            'Hacker News': 'technology',
            'Dev.to': 'development',
            'Product Hunt': 'products',
            'TechCrunch': 'startups',
            'Reddit': 'community'
        };

        // Detect category from source
        function getCategory(source) {
            for (const [key, category] of Object.entries(categoryMap)) {
                if (source.includes(key)) return category;
            }
            return 'other';
        }

        // Load articles
        async function loadArticles() {
            try {
                const response = await fetch('data.json');
                allArticles = await response.json();
                
                // Add category to each article
                allArticles = allArticles.map(article => ({
                    ...article,
                    category: getCategory(article.source)
                }));
                
                filteredArticles = [...allArticles];
                initializeFilters();
                initializeCategories();
                updateStats();
                renderArticles();
            } catch (error) {
                console.error('Error loading articles:', error);
                document.getElementById('newsGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-title">Unable to load articles</div>
                        <div class="empty-state-text">Please ensure data.json exists in the same directory</div>
                    </div>
                `;
            }
        }

        // Initialize source filters
        function initializeFilters() {
            const sources = [...new Set(allArticles.map(a => a.source))].sort();
            const dropdown = document.getElementById('filtersDropdown');
            
            dropdown.innerHTML = sources.map(source => `
                <label class="dropdown-item">
                    <input type="checkbox" value="${source}" class="source-filter">
                    <span>${source}</span>
                </label>
            `).join('');

            document.querySelectorAll('.source-filter').forEach(checkbox => {
                checkbox.addEventListener('change', handleFilterChange);
            });
        }

        // Initialize category tabs
        function initializeCategories() {
            const categories = ['all', ...new Set(allArticles.map(a => a.category))];
            const tabsContainer = document.getElementById('categoryTabs');
            
            tabsContainer.innerHTML = categories.map(cat => {
                const count = allArticles.filter(a => a.category === cat).length;
                const label = cat === 'all' ? 'All Articles' : cat.charAt(0).toUpperCase() + cat.slice(1);
                const icons = {
                    'all': '📰',
                    'technology': '💻',
                    'development': '⚙️',
                    'products': '🚀',
                    'startups': '🏢',
                    'community': '👥',
                    'other': '📌'
                };
                
                return `
                    <button class="category-tab ${cat === 'all' ? 'active' : ''}" data-category="${cat}">
                        <span>${icons[cat] || '📌'} ${label} (${count})</span>
                    </button>
                `;
            }).join('');

            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => handleCategoryChange(tab.dataset.category));
            });
        }

        // Filter button toggle
        document.getElementById('filterBtn').addEventListener('click', () => {
            document.getElementById('filtersDropdown').classList.toggle('show');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                document.getElementById('filtersDropdown').classList.remove('show');
            }
        });

        // Handle source filter changes
        function handleFilterChange(e) {
            const value = e.target.value;
            if (e.target.checked) {
                activeFilters.add(value);
            } else {
                activeFilters.delete(value);
            }
            applyFilters();
        }

        // Handle category change
        function handleCategoryChange(category) {
            activeCategory = category;
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            applyFilters();
        }

        // Apply all filters
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredArticles = allArticles.filter(article => {
                const matchesSearch = article.title.toLowerCase().includes(searchTerm) ||
                                    article.url.toLowerCase().includes(searchTerm);
                const matchesSourceFilter = activeFilters.size === 0 || activeFilters.has(article.source);
                const matchesCategory = activeCategory === 'all' || article.category === activeCategory;
                return matchesSearch && matchesSourceFilter && matchesCategory;
            });

            updateFilterButton();
            updateSectionTitle();
            renderArticles();
        }

        // Update filter button
        function updateFilterButton() {
            const btn = document.getElementById('filterBtn');
            if (activeFilters.size > 0) {
                btn.classList.add('active');
                btn.textContent = `✓ Sources (${activeFilters.size})`;
            } else {
                btn.classList.remove('active');
                btn.textContent = '🔽 Sources';
            }
        }

        // Update section title
        function updateSectionTitle() {
            const title = document.getElementById('sectionTitle');
            if (activeCategory === 'all') {
                title.textContent = 'All Articles';
            } else {
                title.textContent = activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1) + ' News';
            }
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Render articles
        function renderArticles() {
            const grid = document.getElementById('newsGrid');
            
            if (filteredArticles.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div class="empty-state-title">No articles found</div>
                        <div class="empty-state-text">Try adjusting your search or filters</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = filteredArticles.map(article => {
                const date = new Date(article.timestamp);
                const timeAgo = getTimeAgo(date);
                
                return `
                    <div class="news-card">
                        <div class="news-card-header">
                            <div class="news-card-badges">
                                <span class="badge badge-source">${escapeHTML(article.source)}</span>
                                <span class="badge badge-category">${article.category}</span>
                            </div>
                            <h3 class="news-card-title">${escapeHTML(article.title)}</h3>
                        </div>
                        <div class="news-card-footer">
                            <span class="news-card-time">🕐 ${timeAgo}</span>
                            <a href="${article.url}" target="_blank" rel="noopener noreferrer" class="news-card-read">Read →</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update statistics
        function updateStats() {
            const sources = new Set(filteredArticles.map(a => a.source));
            document.getElementById('totalCount').textContent = filteredArticles.length;
            document.getElementById('sourceCount').textContent = sources.size;
            
            if (allArticles.length > 0) {
                const lastDate = new Date(allArticles[0].timestamp);
                document.getElementById('lastUpdated').textContent = formatDate(lastDate);
            }
        }

        // Utility functions
        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
            if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
            
            return formatDate(date);
        }

        function formatDate(date) {
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Update stats when filtering
        const originalRender = renderArticles;
        renderArticles = function() {
            updateStats();
            originalRender();
        };

        // Load articles on page load
        loadArticles();
    </script>
</body>
</html>
